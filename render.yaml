services:
  # Backend Service
  - type: web
    name: attendance-api
    env: node
    plan: free
    rootDir: apps/server
    buildCommand: npm install && npx prisma generate
    startCommand: node index.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: attendance-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production

databases:
  - name: attendance-db
    plan: free
